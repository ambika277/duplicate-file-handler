<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Upload with Duplicate Handling</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-MlZfwcxU5cVVkYdS+6V1kU9UdrAtYSbCwCCX0/WvgenGid9Yu+syzQbE+NE1cgQm" crossorigin="anonymous">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Upload a File</h1>
    <form id="uploadForm">
        <div class="form-group">
            <input type="file" name="file" class="form-control" required />
        </div>
        <div class="form-group text-right">
            <button type="submit" class="btn btn-primary">Upload</button>
        </div>
    </form>
    <div id="message" class="mt-3 text-info"></div>

    <h2 class="mt-5">Uploaded Files</h2>
    <ul id="fileList" class="list-group"></ul>
</div>

<script type="module">
    async function refreshFileList() {
        const response = await fetch('/files');
        const files = await response.json();
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '';
    
        files.forEach((file, index) => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';
    
            const fileText = `${index + 1} - ${file.filename}`;
    
            if (file.filename.toLowerCase().endsWith('.pdf')) {
                const a = document.createElement('a');
                a.href = `/uploads/${encodeURIComponent(file.filename)}`;
                a.target = '_blank';
                a.textContent = fileText;
                li.appendChild(a);
            } else {
                li.textContent = fileText;
            }
    
            const btn = document.createElement('button');
            btn.className = 'btn btn-danger btn-sm ml-2';
            btn.textContent = 'Delete';
            btn.onclick = () => deleteFile(file.filename);
    
            li.appendChild(btn);
            fileList.appendChild(li);
        });
    }
    

    async function deleteFile(filename) {
        const res = await fetch(`/delete/${filename}`, { method: 'DELETE' });
        const result = await res.json();
        showMessage(result.message);
        refreshFileList();
    }

    function showMessage(msg) {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = msg;
        msgDiv.classList.add('text-success');
        setTimeout(() => {
            msgDiv.textContent = '';
        }, 5000); // Show for 5 seconds
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const result = await res.json();

        if (res.status === 409) {
            const action = prompt(`File "${result.filename}" exists. Choose: overwrite, skip, rename`);
            if (action === 'overwrite') {
                formData.append('action', action);
                const dupRes = await fetch('/handle_duplicate', {
                    method: 'POST',
                    body: formData
                });
                const dupResult = await dupRes.json();
                showMessage(dupResult.message);
            } else if (action === 'skip') {
                showMessage("File upload skipped.");
            } else if (action === 'rename') {
                const newFilename = prompt("Enter new name for the file :", result.filename.split('.')[0]);
                if (newFilename) {
                    formData.append('action', action);
                    formData.append('filename', newFilename + '.' + result.filename.split('.').pop());
                    const dupRes = await fetch('/handle_duplicate', {
                        method: 'POST',
                        body: formData
                    });
                    const dupResult = await dupRes.json();
                    showMessage(dupResult.message);
                } else {
                    showMessage("Invalid name. Upload cancelled.");
                }
            } else {
                showMessage("Invalid action. Upload cancelled.");
            }
        } else {
            showMessage(result.message);

        }

        refreshFileList();
        e.target.reset();
    });

    refreshFileList();
</script>
</body>
</html>
